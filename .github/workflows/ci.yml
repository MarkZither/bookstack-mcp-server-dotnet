name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write # required for Codecov PR comment

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore
        env:
          HUSKY: 0

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Test with coverage
        run: |
          dotnet-coverage collect \
            "dotnet test --project tests/BookStack.Mcp.Server.Tests/BookStack.Mcp.Server.Tests.csproj --no-build --configuration Release" \
            --output coverage/coverage.cobertura.xml \
            --output-format cobertura

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage.cobertura.xml
          fail_ci_if_error: false

      - name: Format
        run: dotnet format --verify-no-changes

  extension-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'

      - name: npm ci
        working-directory: vscode-extension
        run: npm ci

      - name: Lint
        working-directory: vscode-extension
        run: npm run lint
