name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            output: bookstack-mcp-server-linux
          - rid: win-x64
            output: bookstack-mcp-server.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish src/BookStack.Mcp.Server/BookStack.Mcp.Server.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -o publish/${{ matrix.rid }}/

      - name: Stage binary
        run: |
          mkdir -p vscode-extension/bin
          find publish/${{ matrix.rid }}/ -name 'BookStack.Mcp.Server*' ! -name '*.json' \
            -exec cp {} vscode-extension/bin/${{ matrix.output }} \;
          chmod +x vscode-extension/bin/${{ matrix.output }} || true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-${{ matrix.rid }}
          path: vscode-extension/bin/${{ matrix.output }}

  package-and-publish:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-linux-x64
          path: vscode-extension/bin/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-win-x64
          path: vscode-extension/bin/

      - name: Make linux binary executable
        run: chmod +x vscode-extension/bin/bookstack-mcp-server-linux

      - name: npm ci
        working-directory: vscode-extension
        run: npm ci

      - name: Build extension
        working-directory: vscode-extension
        run: npm run build

      - name: Package VSIX
        working-directory: vscode-extension
        run: npx vsce package --out bookstack-mcp-server.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: vscode-extension/bookstack-mcp-server.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --pat "$VSCE_PAT"

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b3b5e5ef96b0a24b7e07b8a5d55b91f5174 # v3

      - name: Build and push Docker image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/markzither/bookstack-mcp-server:latest
            ghcr.io/markzither/bookstack-mcp-server:${{ steps.version.outputs.tag }}
            markzither/bookstack-mcp-server:latest
            markzither/bookstack-mcp-server:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
