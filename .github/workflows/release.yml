name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            output: bookstack-mcp-server-linux
          - rid: win-x64
            output: bookstack-mcp-server.exe
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish src/BookStack.Mcp.Server/BookStack.Mcp.Server.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -o publish/${{ matrix.rid }}/

      - name: Stage binary
        run: |
          mkdir -p vscode-extension/bin
          find publish/${{ matrix.rid }}/ -name 'BookStack.Mcp.Server*' ! -name '*.json' \
            -exec cp {} vscode-extension/bin/${{ matrix.output }} \;
          chmod +x vscode-extension/bin/${{ matrix.output }} || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.rid }}
          path: vscode-extension/bin/${{ matrix.output }}

  package-and-publish:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-linux-x64
          path: vscode-extension/bin/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-win-x64
          path: vscode-extension/bin/

      - name: Make linux binary executable
        run: chmod +x vscode-extension/bin/bookstack-mcp-server-linux

      - name: npm ci
        working-directory: vscode-extension
        run: npm ci

      - name: Build extension
        working-directory: vscode-extension
        run: npm run build

      - name: Package VSIX
        working-directory: vscode-extension
        run: npx vsce package --out bookstack-mcp-server.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: vscode-extension/bookstack-mcp-server.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --pat "$VSCE_PAT"

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Publish server (framework-dependent)
        run: |
          dotnet publish src/BookStack.Mcp.Server/BookStack.Mcp.Server.csproj \
            -c Release \
            -o docker-publish \
            --no-self-contained

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/markzither/bookstack-mcp-server:latest
            ghcr.io/markzither/bookstack-mcp-server:${{ steps.version.outputs.tag }}
            markzither/bookstack-mcp-server:latest
            markzither/bookstack-mcp-server:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
