name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            output: bookstack-mcp-server-linux
          - rid: win-x64
            output: bookstack-mcp-server.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish src/BookStack.Mcp.Server/BookStack.Mcp.Server.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -o publish/${{ matrix.rid }}/

      - name: Stage binary
        run: |
          mkdir -p vscode-extension/bin
          find publish/${{ matrix.rid }}/ -name 'BookStack.Mcp.Server*' ! -name '*.json' \
            -exec cp {} vscode-extension/bin/${{ matrix.output }} \;
          chmod +x vscode-extension/bin/${{ matrix.output }} || true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-${{ matrix.rid }}
          path: vscode-extension/bin/${{ matrix.output }}

  package-and-publish:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-linux-x64
          path: vscode-extension/bin/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-win-x64
          path: vscode-extension/bin/

      - name: Make linux binary executable
        run: chmod +x vscode-extension/bin/bookstack-mcp-server-linux

      - name: npm ci
        working-directory: vscode-extension
        run: npm ci

      - name: Build extension
        working-directory: vscode-extension
        run: npm run build

      - name: Package VSIX
        working-directory: vscode-extension
        run: npx vsce package --out bookstack-mcp-server.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039c0d9c8b6f37b0da36767 # v2
        with:
          files: vscode-extension/bookstack-mcp-server.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --pat "$VSCE_PAT"
