# BookStack MCP Server — PostgreSQL + pgvector + Ollama (all in containers)
#
# Semantic search is enabled. A PostgreSQL container with the pgvector extension
# is used for the vector store. Embeddings are generated by a local Ollama container.
#
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d
#
# On first run, pull the embedding model:
#   docker compose -f docker-compose.postgres.yml exec ollama \
#     ollama pull nomic-embed-text
#
# MCP endpoint:  http://localhost:3000/mcp  (Bearer token required)
# Health check:  http://localhost:3000/health

services:
  bookstack-mcp:
    image: ghcr.io/markzither/bookstack-mcp-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      BOOKSTACK_BASE_URL: ${BOOKSTACK_BASE_URL}
      BOOKSTACK_TOKEN_SECRET: ${BOOKSTACK_TOKEN_SECRET}
      BOOKSTACK_MCP_TRANSPORT: http
      BOOKSTACK_MCP_HTTP_PORT: "3000"
      BOOKSTACK_MCP_HTTP_AUTH_TOKEN: ${BOOKSTACK_MCP_HTTP_AUTH_TOKEN}
      # Vector search
      VectorSearch__Enabled: "true"
      VectorSearch__Database: Postgres
      ConnectionStrings__VectorDb: >-
        Host=postgres;Port=5432;Database=bookstack_vectors;
        Username=${POSTGRES_USER:-bookstack};Password=${POSTGRES_PASSWORD}
      VectorSearch__EmbeddingProvider: Ollama
      VectorSearch__Ollama__BaseUrl: http://ollama:11434
      VectorSearch__Ollama__Model: nomic-embed-text
      VectorSearch__Sync__IntervalHours: "24"
      VectorSearch__Sync__BatchSize: "50"

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookstack_vectors
      POSTGRES_USER: ${POSTGRES_USER:-bookstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookstack} -d bookstack_vectors"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
