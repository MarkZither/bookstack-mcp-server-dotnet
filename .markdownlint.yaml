---
# Markdownlint configuration for bookstack-mcp-server-dotnet
default: true

# MD013 - Line length
MD013:
  line_length: 120
  code_blocks: false
  tables: false

# MD033 - Inline HTML (allow admonition-style block quotes)
MD033: false

# MD041 - First line should be a heading (relax for templates)
MD041: false

# MD024 - No duplicate headings (allow same headings in different sections)
MD024:
  allow_different_nesting: true

# MD007 - Unordered list indentation
MD007:
  indent: 2
