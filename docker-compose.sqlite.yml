# BookStack MCP Server — SQLite vector search + Ollama embeddings
#
# Semantic search is enabled. Embeddings are generated by a local Ollama container
# and stored in a SQLite database file on the host via a named volume.
#
# Usage:
#   docker compose -f docker-compose.sqlite.yml up -d
#
# On first run, pull the embedding model:
#   docker compose -f docker-compose.sqlite.yml exec ollama \
#     ollama pull nomic-embed-text
#
# MCP endpoint:  http://localhost:3000/mcp  (Bearer token required)
# Health check:  http://localhost:3000/health

services:
  bookstack-mcp:
    image: markzither/bookstack-mcp-server:latest
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - vector-data:/app/data
    environment:
      BOOKSTACK_BASE_URL: ${BOOKSTACK_BASE_URL}
      BOOKSTACK_TOKEN_SECRET: ${BOOKSTACK_TOKEN_SECRET}
      BOOKSTACK_MCP_TRANSPORT: http
      BOOKSTACK_MCP_HTTP_PORT: "3000"
      BOOKSTACK_MCP_HTTP_AUTH_TOKEN: ${BOOKSTACK_MCP_HTTP_AUTH_TOKEN}
      # Vector search
      VectorSearch__Enabled: "true"
      VectorSearch__Database: Sqlite
      ConnectionStrings__VectorDb: "Data Source=/app/data/bookstack-vectors.db"
      VectorSearch__EmbeddingProvider: Ollama
      VectorSearch__Ollama__BaseUrl: http://ollama:11434
      VectorSearch__Ollama__Model: nomic-embed-text
      VectorSearch__Sync__IntervalHours: "24"
      VectorSearch__Sync__BatchSize: "50"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama

volumes:
  vector-data:
  ollama-data:
